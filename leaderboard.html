<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>🏆 Leaderboard</h2>

    <pre id="data">Loading...</pre>

    <br>
    <button onclick="goBack()">⬅ Back to Quiz</button>
</div>

<script>
// load leaderboard
async function loadLeaderboard(){
    try {
        let res = await fetch("/leaderboard");
        let text = await res.text();

        document.getElementById("data").innerText = text || "No scores yet";
    } catch (err) {
        document.getElementById("data").innerText = "Error loading leaderboard";
    }
}

// back button
function goBack(){
    window.location = "quiz.html";
}

// auto load
loadLeaderboard();
</script>

</body>
</html>
