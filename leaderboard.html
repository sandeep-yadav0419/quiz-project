<!DOCTYPE html>
<html>
<body style="background:#141e30;color:white;text-align:center;">

<h1>🏆 Leaderboard</h1>
<div id="board"></div>

<script>
async function load(){
let res=await fetch("/leaderboard");
let data=await res.json();

let html="";
data.forEach((p,i)=>{
html+=`<p>${i+1}. ${p.name} - ${p.score}</p>`;
});

document.getElementById("board").innerHTML=html;
}
load();
</script>

</body>
</html>
