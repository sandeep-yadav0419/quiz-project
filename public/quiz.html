<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h3 id="user"></h3>

<select id="level">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="start()">Start</button>

<h3 id="timer"></h3>
<h2 id="q"></h2>
<div id="opt"></div>

<h3 id="score"></h3>
<button onclick="loadLB()">Leaderboard</button>
<pre id="lb"></pre>
</div>

<!-- CHAT -->
<div class="chat">
<div class="chat-messages" id="chat"></div>
<input id="msg"><button onclick="send()">Send</button>
</div>

<script>
document.getElementById("user").innerText="Welcome "+localStorage.getItem("user");

let q=[],i=0,s=0,t;

async function start(){
let level=document.getElementById("level").value;
let res=await fetch(`/quiz?level=${level}`);
q=await res.json();
i=0;s=0;load();
}

function load(){
if(i>=q.length){end();return;}
let cur=q[i];
document.getElementById("q").innerText=cur.q;
let d=document.getElementById("opt");d.innerHTML="";
cur.options.forEach((o,idx)=>{
let b=document.createElement("button");
b.innerText=o;b.className="option";
b.onclick=()=>check(idx,b);
d.appendChild(b);
});
timer();
}

function check(idx,b){
clearInterval(t);
if(idx===q[i].answer){b.classList.add("correct");s++;}
else b.classList.add("wrong");
setTimeout(()=>{i++;load();},700);
}

function timer(){
let time=10;
t=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏳ "+time;
if(time<=0){clearInterval(t);i++;load();}
},1000);
}

function end(){
let name=localStorage.getItem("user");
fetch("/score",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,score:s})});
document.getElementById("score").innerText="Score: "+s;
}

async function loadLB(){
let r=await fetch("/leaderboard");
document.getElementById("lb").innerText=await r.text();
}

// CHATBOT
function send(){
let msg=document.getElementById("msg").value;
add(msg,"user");

setTimeout(()=>{
let reply=getReply(msg);
add(reply,"bot");
speechSynthesis.speak(new SpeechSynthesisUtterance(reply));
},800);
}

function add(t,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=t;
document.getElementById("chat").appendChild(d);
}

function getReply(m){
m=m.toLowerCase();
if(m.includes("hi")) return "Hello 👋";
if(m.includes("c")) return "C is powerful language 💻";
if(m.includes("loop")) return "Loop repeats 🔁";
return "Interesting 🤔";
}
</script>

</body>
</html>
