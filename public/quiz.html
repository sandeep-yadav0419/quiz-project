<!DOCTYPE html>
<html>
<head>
<title>AI Quiz Pro</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family: Arial;
    color:white;
}

.container{
    width: 420px;
    margin: auto;
    margin-top: 40px;
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2,h3{text-align:center;}

button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    background:#3b82f6;
    color:white;
}

button:hover{transform:scale(1.05);}

.option{background:#1f1f1f;}
.option:hover{background:#333;}

.correct{background:green !important;}
.wrong{background:red !important;}

/* CHAT */
.chat{
    position:fixed;
    bottom:10px;
    right:10px;
    width:280px;
    background:#111;
    border-radius:10px;
    padding:10px;
}

.chat-messages{
    height:150px;
    overflow:auto;
    font-size:14px;
}

.msg{
    padding:5px;
    margin:3px;
    border-radius:5px;
}

.user{background:#3b82f6;}
.bot{background:#444;}

input{
    width:70%;
    padding:6px;
    border-radius:5px;
    border:none;
}

/* typing animation */
.typing span{
    animation: blink 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
    0%,80%,100%{opacity:0;}
    40%{opacity:1;}
}
</style>
</head>

<body>

<div class="container">
<h2>🎮 AI Quiz Pro</h2>

<h3 id="user"></h3>

<select id="level">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<button onclick="start()">🚀 Start Quiz</button>

<h3 id="timer"></h3>
<h2 id="q"></h2>
<div id="opt"></div>

<h3 id="score"></h3>

<button onclick="loadLB()">🏆 Leaderboard</button>
<pre id="lb"></pre>
</div>

<!-- CHAT -->
<div class="chat">
<div class="chat-messages" id="chat"></div>
<input id="msg" placeholder="Ask something...">
<button onclick="send()">Send</button>
</div>

<script>
document.getElementById("user").innerText="Welcome "+localStorage.getItem("user");

let q=[],i=0,s=0,t;

// START QUIZ
async function start(){
let level=document.getElementById("level").value;
let res=await fetch(`/quiz?level=${level}`);
q=await res.json();
i=0;s=0;
document.getElementById("score").innerText="";
load();
}

// LOAD QUESTION
function load(){
if(i>=q.length){end();return;}

let cur=q[i];
document.getElementById("q").innerText=cur.q;

let d=document.getElementById("opt");
d.innerHTML="";

cur.options.forEach((o,idx)=>{
let b=document.createElement("button");
b.innerText=o;
b.className="option";
b.onclick=()=>check(idx,b);
d.appendChild(b);
});

timer();
}

// CHECK ANSWER
function check(idx,b){
clearInterval(t);

if(idx===q[i].answer){
b.classList.add("correct");
s++;
}else{
b.classList.add("wrong");
}

setTimeout(()=>{
i++;
load();
},800);
}

// TIMER
function timer(){
let time=10;
t=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏳ "+time+"s";

if(time<=0){
clearInterval(t);
i++;
load();
}
},1000);
}

// END QUIZ
function end(){
let name=localStorage.getItem("user");

fetch("/score",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,score:s})
});

document.getElementById("score").innerText="🎯 Final Score: "+s+" / "+q.length;
}

// LOAD LEADERBOARD
async function loadLB(){
let r=await fetch("/leaderboard");
document.getElementById("lb").innerText=await r.text();
}

/////////////////////////
// 🤖 REAL CHATBOT
/////////////////////////

const chatBox = document.getElementById("chat");
const input = document.getElementById("msg");

// ENTER KEY
input.addEventListener("keypress", function(e){
    if(e.key === "Enter") send();
});

// SEND
async function send(){
    let msg = input.value.trim();
    if(!msg) return;

    addMessage(msg, "user");
    input.value = "";

    // typing
    let typingDiv = document.createElement("div");
    typingDiv.className = "msg bot";
    typingDiv.innerHTML = `<span class="typing"><span>.</span><span>.</span><span>.</span></span>`;
    chatBox.appendChild(typingDiv);
    scrollDown();

    try{
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ message: msg })
        });

        let data = await res.json();

        typingDiv.remove();
        addMessage(data.reply, "bot");

        // voice
        speechSynthesis.cancel();
        let speech = new SpeechSynthesisUtterance(data.reply);
        speechSynthesis.speak(speech);

    }catch{
        typingDiv.remove();
        addMessage("Server error 😢", "bot");
    }
}

// ADD MESSAGE
function addMessage(text, type){
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chatBox.appendChild(div);
    scrollDown();
}

// SCROLL
function scrollDown(){
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
