<!DOCTYPE html>
<html>
<head>
<title>Login - AI Quiz Pro</title>
<link rel="stylesheet" href="style.css">

<style>
/* CENTER FULL PAGE */
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* LOGIN CARD */
.login-box{
    width:350px;
    padding:30px;
    border-radius:20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    text-align:center;
    animation: fadeIn 0.8s ease;
}

/* TITLE */
.login-box h2{
    margin-bottom:20px;
}

/* INPUT */
.login-box input{
    width:90%;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    margin-bottom:15px;
    background: rgba(255,255,255,0.1);
    color:white;
    font-size:16px;
}

/* INPUT FOCUS */
.login-box input:focus{
    border:1px solid #3b82f6;
    box-shadow: 0 0 8px #3b82f6;
}

/* BUTTON */
.login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,#3b82f6,#2563eb);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.login-box button:hover{
    transform: translateY(-2px);
    box-shadow:0 0 10px #3b82f6;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform: translateY(20px);}
    to{opacity:1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="login-box">
    <h2>🚀 AI Quiz Pro</h2>
    <p style="opacity:0.7;">Enter your name to begin</p>

    <input id="name" placeholder="Your Name..." autocomplete="off">
    
    <button onclick="login()">Start Quiz 🎯</button>
</div>

<script>
function login(){
 let name=document.getElementById("name").value.trim();

 if(!name){
    alert("Please enter your name 😅");
    return;
 }

 localStorage.setItem("user",name);

 // smooth transition
 document.body.style.opacity="0";
 setTimeout(()=>{
    window.location="quiz.html";
 },500);
}
</script>

</body>
</html>
