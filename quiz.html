<!DOCTYPE html>
<html>
<head>
    <title>AI Quiz</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .option {
            display: block;
            margin: 10px auto;
            width: 200px;
            background: #1e293b;
            color: white;
        }

        .correct { background: green !important; }
        .wrong { background: red !important; }

        #timer { font-size: 20px; }

        /* CHAT UI */
        #chatbox {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 280px;
            height: 350px;
            background: #1e293b;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
        }

        .msg {
            padding: 8px;
            margin: 5px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user {
            background: #3b82f6;
            align-self: flex-end;
        }

        .bot {
            background: #374151;
            align-self: flex-start;
        }

        #chatInputBox {
            display: flex;
        }

        #chatInput {
            flex: 1;
            padding: 5px;
        }
    </style>
</head>
<body>

<h1>🎮 AI Quiz</h1>

<select id="level">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
</select>

<button onclick="startQuiz()">Start 🚀</button>

<div id="timer">⏳ 10</div>
<h2 id="question"></h2>
<div id="options"></div>
<h3 id="score"></h3>

<!-- 🤖 CHATBOT -->
<div id="chatbox">
    <div id="chatMessages"></div>

    <div id="chatInputBox">
        <input id="chatInput" placeholder="Type message..." />
        <button onclick="sendChat()">➤</button>
    </div>
</div>

<script>
let questions = [];
let index = 0;
let score = 0;
let time = 10;
let timer;

// QUIZ
async function startQuiz() {
    const level = document.getElementById("level").value;
    const res = await fetch(`/quiz?level=${level}`);
    questions = await res.json();

    index = 0;
    score = 0;
    loadQuestion();
}

function loadQuestion() {
    if (index >= questions.length) {
        showScore();
        return;
    }

    time = 10;
    startTimer();

    let q = questions[index];
    document.getElementById("question").innerText = `Q${index+1}: ${q.q}`;

    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "option";

        btn.onclick = () => checkAnswer(i, btn);

        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(i, btn) {
    clearInterval(timer);

    if (i === questions[index].answer) {
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
    }

    setTimeout(() => {
        index++;
        loadQuestion();
    }, 800);
}

// TIMER
function startTimer() {
    document.getElementById("timer").innerText = `⏳ ${time}`;
    clearInterval(timer);

    timer = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = `⏳ ${time}`;

        if (time <= 0) {
            clearInterval(timer);
            index++;
            loadQuestion();
        }
    }, 1000);
}

// SCORE ANIMATION
function showScore() {
    let s = 0;
    let final = score;

    let interval = setInterval(() => {
        document.getElementById("score").innerText = `Score: ${s}`;
        s++;
        if (s > final) clearInterval(interval);
    }, 100);
}

// 🤖 REALISTIC CHATBOT
function sendChat() {
    let input = document.getElementById("chatInput");
    let msg = input.value;
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    showTyping();

    setTimeout(() => {
        let reply = generateReply(msg.toLowerCase());
        addMessage(reply, "bot");
    }, 1000 + Math.random() * 1000);
}

// typing effect
function showTyping() {
    addMessage("typing...", "bot");
}

// add message
function addMessage(text, type) {
    let chat = document.getElementById("chatMessages");

    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// smart replies
function generateReply(msg) {

    if (msg.includes("hi") || msg.includes("hello"))
        return "Hey 😄 kaise help karu?";

    if (msg.includes("name"))
        return "Main AI Quiz Bot hoon 🤖";

    if (msg.includes("c"))
        return "C ek powerful programming language hai 💻";

    if (msg.includes("loop"))
        return "Loop repetition ke liye use hota hai 🔁";

    if (msg.includes("pointer"))
        return "Pointer memory address store karta hai 📌";

    if (msg.includes("array"))
        return "Array same type ke values store karta hai 📦";

    const random = [
        "Hmm interesting 🤔",
        "Thoda aur explain kar sakte ho?",
        "Yeh acha question hai 😄",
        "Main soch raha hoon...",
        "Try asking about C programming 💻"
    ];

    return random[Math.floor(Math.random() * random.length)];
}
</script>

</body>
</html>
