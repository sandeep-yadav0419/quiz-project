<!DOCTYPE html>
<html>
<head>
    <title>AI Quiz</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
        }
        .option {
            display: block;
            margin: 10px auto;
            width: 200px;
            background: #1e293b;
            color: white;
        }
        .correct { background: green !important; }
        .wrong { background: red !important; }

        #timer {
            font-size: 20px;
            margin: 10px;
        }

        #chatbox {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 250px;
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>🎮 AI Quiz</h1>

<select id="level">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
</select>

<button onclick="startQuiz()">Start 🚀</button>

<div id="timer">⏳ 10</div>
<h2 id="question"></h2>
<div id="options"></div>

<h3 id="score"></h3>

<!-- 🤖 CHATBOT -->
<div id="chatbox">
    <h4>🤖 Chatbot</h4>
    <input id="chatInput" placeholder="Ask something..." />
    <button onclick="sendChat()">Send</button>
    <p id="chatResponse"></p>
</div>

<script>
let questions = [];
let index = 0;
let score = 0;
let time = 10;
let timer;

async function startQuiz() {
    const level = document.getElementById("level").value;
    const res = await fetch(`/quiz?level=${level}`);
    questions = await res.json();

    index = 0;
    score = 0;

    loadQuestion();
}

function loadQuestion() {
    if (index >= questions.length) {
        showScore();
        return;
    }

    time = 10;
    startTimer();

    let q = questions[index];
    document.getElementById("question").innerText = `Q${index+1}: ${q.q}`;

    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "option";

        btn.onclick = () => checkAnswer(i, btn);

        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(i, btn) {
    clearInterval(timer);

    if (i === questions[index].answer) {
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
    }

    setTimeout(() => {
        index++;
        loadQuestion();
    }, 800);
}

// ⏳ TIMER
function startTimer() {
    document.getElementById("timer").innerText = `⏳ ${time}`;
    clearInterval(timer);

    timer = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = `⏳ ${time}`;

        if (time <= 0) {
            clearInterval(timer);
            index++;
            loadQuestion();
        }
    }, 1000);
}

// 🎯 SCORE ANIMATION
function showScore() {
    let s = 0;
    let final = score;

    let interval = setInterval(() => {
        document.getElementById("score").innerText = `Score: ${s}`;
        s++;
        if (s > final) clearInterval(interval);
    }, 100);
}

// 🤖 SIMPLE CHATBOT (STATIC)
function sendChat() {
    let msg = document.getElementById("chatInput").value;
    let response = "I am a quiz bot 🤖";

    if (msg.toLowerCase().includes("c")) {
        response = "C is a programming language 💻";
    } else if (msg.toLowerCase().includes("loop")) {
        response = "Loops are used for repetition 🔁";
    }

    document.getElementById("chatResponse").innerText = response;
}
</script>

</body>
</html>
