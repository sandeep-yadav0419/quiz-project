<!DOCTYPE html>
<html>
<head>
<title>AI Quiz 🔥</title>
</head>

<body style="background:#141e30;color:white;text-align:center;">

<h1>🔥 AI Quiz</h1>

<input id="name" placeholder="Enter Name">
<button onclick="start()">Start</button>

<div id="quiz"></div>

<script>

let questions = [];
let i = 0;
let score = 0;
let name = "";

async function start(){

    console.log("Start clicked");

    name = document.getElementById("name").value;

    if(name==""){
        alert("Enter name bro 😅");
        return;
    }

    try {

        let res = await fetch("/quiz");
        let data = await res.json();

        console.log("API DATA:", data);

        // 🔥 IMPORTANT FIX
        if(!data || data.length === 0){
            alert("Questions load nahi hue 😭");
            return;
        }

        questions = data;

        i = 0;
        score = 0;

        show();

    } catch(err){
        alert("Server error 😭");
        console.log(err);
    }
}

function show(){

    // 🔥 SAFETY CHECK
    if(!questions[i]){
        document.getElementById("quiz").innerHTML = "No questions 😭";
        return;
    }

    let q = questions[i];

    let html = `<h3>${q.q}</h3>`;

    q.options.forEach((o,idx)=>{
        html += `<button onclick="ans(${idx+1})">${o}</button><br>`;
    });

    document.getElementById("quiz").innerHTML = html;
}

function ans(a){

    if(a == questions[i].answer) score++;

    i++;

    if(i < questions.length){
        show();
    } else {
        finish();
    }
}

async function finish(){

    document.getElementById("quiz").innerHTML = "<h2>Score: " + score + "</h2>";

    await fetch("/score",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,score})
    });
}

</script>

<a href="leaderboard.html">🏆 Leaderboard</a>

</body>
</html>
